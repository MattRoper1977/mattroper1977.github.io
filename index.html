<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Made by Matt — lessons, apps &amp; games</title>
<meta name="description" content="Lessons, apps and games — built one file at a time in Teesside.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' rx='9' fill='%230D1B2E'/%3E%3Ccircle cx='20' cy='16' r='7' fill='%23FFD76A'/%3E%3Cellipse cx='20' cy='27' rx='11' ry='4' fill='%23F6F9FD'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,650;1,9..144,500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A161F; --bg-hi:#10222E;
  --ink:#EAF2F2; --ink-dim:#A8BEC4;
  --teal:#38B2AC; --teal-hi:#5EEAD4;
  --gold:#FFD76A;
  --radius:24px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%}
body{
  font-family:'Space Grotesk',system-ui,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1000px 600px at 80% -10%, rgba(56,178,172,.14), transparent 60%),
    radial-gradient(800px 500px at 10% 110%, rgba(123,44,191,.12), transparent 60%),
    linear-gradient(180deg,var(--bg-hi) 0%,var(--bg) 55%,#07101A 100%);
  display:flex;flex-direction:column;overflow-x:hidden;
}

/* ---------- ambient circuit + stars ---------- */
.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.ambient svg{position:absolute;inset:0;width:100%;height:100%}
.astar{position:absolute;width:2px;height:2px;border-radius:50%;background:#cfe8ea;animation:twinkle 4s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.7}}

/* ---------- header ---------- */
header{position:relative;z-index:2;text-align:center;padding:clamp(2.2rem,6vh,3.6rem) 1.2rem .6rem}
.wordmark{
  font-family:'Fraunces',serif;font-weight:650;
  font-size:clamp(2.5rem,7vw,4.2rem);
  letter-spacing:-.015em;line-height:1.05;color:#F4EFE6;
}
.wordmark .by{font-weight:500;font-style:italic}
.strap{margin-top:.65rem;font-size:clamp(.95rem,2.2vw,1.08rem);color:var(--ink-dim)}
.strap b{font-weight:600;color:#D6E4E6}

/* ---------- doors ---------- */
main{
  position:relative;z-index:2;flex:1;
  display:grid;grid-template-columns:repeat(3,minmax(0,1fr));
  gap:clamp(.9rem,2.4vw,1.5rem);
  width:min(1240px,94vw);margin:clamp(1.2rem,4vh,2.4rem) auto;
  align-items:stretch;
}
.door{
  position:relative;display:flex;flex-direction:column;justify-content:flex-end;
  min-height:clamp(360px,54vh,460px);
  border-radius:var(--radius);
  padding:1.9rem 1.7rem 1.7rem;
  text-decoration:none;color:inherit;
  border:1px solid rgba(255,255,255,.10);
  box-shadow:0 18px 50px rgba(0,0,0,.45);
  overflow:hidden;isolation:isolate;
  transition:transform .35s cubic-bezier(.2,.8,.3,1),box-shadow .35s,border-color .35s;
  outline-offset:4px;
}
.door:hover,.door:focus-visible{transform:translateY(-8px);box-shadow:0 28px 64px rgba(0,0,0,.55)}
.door:focus-visible{outline:3px solid var(--gold)}

/* full-bleed artwork layer (when door has an image) */
.art{position:absolute;inset:0;z-index:-2;background-size:cover;background-position:center}
.scrim{position:absolute;inset:0;z-index:-1;
  background:linear-gradient(180deg,rgba(8,20,28,.18) 0%,rgba(8,20,28,.55) 55%,rgba(8,20,28,.9) 100%)}
.door.has-image{border-color:rgba(94,234,212,.35)}
.door.has-image:hover{border-color:rgba(94,234,212,.6)}

/* day / classroom (no-image fallback look) */
.door.day{background:linear-gradient(180deg,#123240 0%,#0D2531 100%)}
.door.day .motif{position:absolute;top:9%;right:10%;font-size:3.2rem;filter:drop-shadow(0 6px 18px rgba(94,234,212,.35));animation:bob 6s ease-in-out infinite}

/* dusk / arcade */
.door.dusk{
  background:linear-gradient(165deg,#FFC98A 0%,#F2955F 48%,#C4587F 100%);
  color:#2b1524;border-color:rgba(255,255,255,.28);
}
.door.dusk .strapline{color:#4a2337}
.door.dusk .label{color:#5c2b40}
.door.dusk .motif{
  position:absolute;top:6%;right:6%;font-size:clamp(4rem,9vw,5.4rem);
  transform:rotate(-12deg);
  filter:drop-shadow(0 10px 24px rgba(43,21,36,.45)) drop-shadow(0 0 26px rgba(255,240,200,.55));
  animation:bob 5s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:rotate(-12deg) translateY(0)}50%{transform:rotate(-12deg) translateY(-9px)}}
.door.day .motif{animation-name:bobplain}
@keyframes bobplain{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

/* night / apps */
.door.night{background:linear-gradient(180deg,#111C31 0%,#0A1424 100%);color:#EAF1FA}
.door.night .strapline{color:#B9CCE4}
.moon{
  position:absolute;top:10%;right:12%;width:56px;height:56px;border-radius:50%;
  background:radial-gradient(circle at 62% 40%,#FFFDF4,#EDE3C4);
  box-shadow:0 0 40px 10px rgba(255,247,214,.30);
}
.moon::after{content:"";position:absolute;top:-7px;left:-11px;width:47px;height:47px;border-radius:50%;background:#0E1930}
.sparkle{position:absolute;color:#EDE9DA;animation:twinkle 3.2s ease-in-out infinite;font-size:1rem}

/* shared door content */
.door .label{
  font-size:.74rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-dim);margin-bottom:.35rem;
}
.door h2{
  font-family:'Fraunces',serif;font-weight:650;
  font-size:clamp(1.7rem,3.4vw,2.25rem);line-height:1.08;margin-bottom:.5rem;
}
.door .strapline{font-size:.97rem;line-height:1.5;max-width:36ch;color:var(--ink-dim)}
.door.has-image .label{color:#CFE3E6}
.door.has-image .strapline{color:#D9E7E9}
.door .go{
  margin-top:1.1rem;display:inline-flex;align-items:center;gap:.45rem;
  font-weight:600;font-size:.95rem;
  background:linear-gradient(180deg,#4FD1C5,#38B2AC);color:#06201E;
  padding:.62rem 1.1rem;border-radius:999px;width:max-content;
  box-shadow:0 6px 18px rgba(56,178,172,.35);
  transition:gap .25s,box-shadow .25s;
}
.door:hover .go,.door:focus-visible .go{gap:.75rem;box-shadow:0 8px 24px rgba(56,178,172,.5)}
.door.dusk .go{background:linear-gradient(180deg,#FFE3B3,#FFC873);color:#3a1c10;box-shadow:0 6px 18px rgba(58,28,16,.35)}
.door.night .go{background:linear-gradient(180deg,#FFE49A,#FFD76A);color:#231a00;box-shadow:0 6px 18px rgba(255,215,106,.30)}

/* ---------- footer ---------- */
footer{
  position:relative;z-index:2;text-align:center;
  padding:.4rem 1.2rem clamp(1.6rem,4vh,2.2rem);
  font-size:.88rem;color:var(--ink-dim);
}
footer a{color:#CFE3E6;font-weight:600;text-decoration:underline;text-underline-offset:3px}
footer a:focus-visible{outline:3px solid var(--gold);outline-offset:3px;border-radius:4px}
.hat{display:inline-block;transition:transform .4s}
footer:hover .hat{transform:translateY(-6px) rotate(-8deg)}

/* ---------- mobile ---------- */
@media (max-width:980px){
  main{grid-template-columns:1fr;width:min(540px,92vw)}
  .door{min-height:300px}
  .door.has-image{min-height:380px}
  .door.dusk .motif{font-size:4rem}
}

/* ---------- reduced motion ---------- */
@media (prefers-reduced-motion:reduce){
  .astar,.sparkle,.motif{animation:none !important}
  .door,.door .go,.hat{transition:none}
}
</style>
</head>
<body>

<div class="ambient" aria-hidden="true">
  <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
    <g stroke="#7BE0DB" stroke-opacity="0.05" stroke-width="1.5" fill="none">
      <path d="M0,140 L320,140 L400,220 L900,220"/>
      <path d="M1440,700 L1120,700 L1040,620 L620,620"/>
      <path d="M1080,0 L1080,900" stroke-dasharray="8,10"/>
      <path d="M240,900 L240,540 L340,440"/>
    </g>
    <g fill="#7BE0DB" fill-opacity="0.12">
      <circle cx="320" cy="140" r="3"/><circle cx="400" cy="220" r="3"/>
      <circle cx="1120" cy="700" r="3"/><circle cx="1040" cy="620" r="3"/>
      <circle cx="240" cy="540" r="3"/>
    </g>
  </svg>
  <span class="astar" style="top:12%;left:8%"></span>
  <span class="astar" style="top:22%;left:30%;animation-delay:-1.4s"></span>
  <span class="astar" style="top:8%;left:58%;animation-delay:-2.2s"></span>
  <span class="astar" style="top:16%;left:86%;animation-delay:-.7s"></span>
  <span class="astar" style="top:55%;left:5%;animation-delay:-3s"></span>
  <span class="astar" style="top:70%;left:94%;animation-delay:-1.9s"></span>
</div>

<header>
  <h1 class="wordmark">Made <span class="by">by</span> Matt</h1>
  <p class="strap">Lessons, apps and games — <b>built one file at a time</b> in Teesside.</p>
</header>

<main id="doors"></main>

<footer>
  <span class="hat" aria-hidden="true">🎩</span>
  Single-file HTML · no tracking · hand-built ·
  <a href="https://github.com/mattroper1977">GitHub</a>
</footer>

<script>
/* Doors render from site.json when hosted; these defaults are the fallback
   so the page still works opened as a local file. Edit site.json, not this. */
const DEFAULT_SITE = {
  strap: "Lessons, apps and games — <b>built one file at a time</b> in Teesside.",
  doors: [
    { theme:"day", label:"For the classroom", title:"Lesson Hub",
      strap:"Interactive lesson packs and print-ready educational resources.",
      cta:"Open the Lesson Hub", href:"https://mattroper1977.github.io/Lessons/",
      image:"images/lessonhub-art.jpg" },
    { theme:"dusk", label:"For after the work's done", title:"Games Arcade",
      strap:"Single-file games. Load in seconds, play for minutes, then carry on.",
      cta:"Open the Arcade", href:"https://mattroper1977.github.io/Lessons/#arcade",
      image:"" },
    { theme:"night", label:"The evening workshop", title:"Matt's Apps",
      strap:"Small, inventive apps and tools for daily utility and creative tinkering.",
      cta:"Explore Apps", href:"https://mattroper1977.github.io/Matt-s-Apps-/",
      image:"" }
  ]
};

const SCENES = {
  day:  '<span class="motif" aria-hidden="true">📖</span>',
  dusk: '<span class="motif" aria-hidden="true">🕹️</span>',
  night:'<div class="moon" aria-hidden="true"></div>' +
        '<span class="sparkle" style="top:14%;right:30%">✦</span>' +
        '<span class="sparkle" style="top:34%;right:10%;animation-delay:-1.2s;font-size:.8rem">✦</span>' +
        '<span class="sparkle" style="top:48%;right:38%;animation-delay:-2.1s;font-size:.7rem">✦</span>'
};

function esc(t){const d=document.createElement('div');d.textContent=t??'';return d.innerHTML;}

function renderDoors(site){
  const main=document.getElementById('doors');
  main.innerHTML='';
  if(site.strap){document.querySelector('.strap').innerHTML=site.strap;}
  (site.doors||[]).forEach(d=>{
    const a=document.createElement('a');
    a.className='door '+esc(d.theme||'day')+(d.image?' has-image':'');
    a.href=d.href||'#';
    const art = d.image
      ? `<div class="art" style="background-image:url('${esc(d.image)}')"></div><div class="scrim"></div>`
      : (SCENES[d.theme]||'');
    a.innerHTML =
      art +
      `<span class="label">${esc(d.label)}</span>` +
      `<h2>${esc(d.title)}</h2>` +
      `<p class="strapline">${esc(d.strap)}</p>` +
      `<span class="go">${esc(d.cta||('Open '+d.title))} <span aria-hidden="true">→</span></span>`;
    main.appendChild(a);
  });
}

fetch('site.json',{cache:'no-store'})
  .then(r=>{if(!r.ok)throw 0;return r.json();})
  .then(renderDoors)
  .catch(()=>renderDoors(DEFAULT_SITE));
</script>
</body>
</html>
